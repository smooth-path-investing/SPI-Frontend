services:
  frontend-dev:
    build:
      context: .
      target: development
    container_name: spi-frontend-dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      DEV_PROXY_TARGET: "http://host.docker.internal:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_DEV_PORT:-8080}:8080"
    volumes:
      - .:/app
      - spi_frontend_node_modules:/app/node_modules

volumes:
  spi_frontend_node_modules:
